velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    # ✅ 三舵轮速度限制（匹配运动模型）
    max_velocity: [1.2, 0.8, 1.0]        # [前进, 侧向, 旋转]
    min_velocity: [-0.35, -0.8, -1.0]    # [后退, 侧向, 旋转]
    max_accel: [2.0, 2.0, 2.0]           # 三轴加速度
    min_accel: [-2.0, -2.0, -2.0]        # 三轴减速度
    odom_topic: "/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0