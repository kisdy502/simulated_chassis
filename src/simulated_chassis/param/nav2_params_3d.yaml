### Nav2 参数配置文件 - Cartographer定位版本 MPPI局部规划器，适配三舵轮+3D雷达

## 定位恢复和行为服务器
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 1.5
    use_sim_time: True
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0          # 三舵轮角速度限制
    min_rotational_vel: 0.2          # 三舵轮最小角速度
    rotational_acc_lim: 2.0          # 三舵轮角加速度

planner_server:
  ros__parameters:
    use_sim_time: True
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: false   # ✅ 改为 true，允许未知区域

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

## 平滑器服务器
smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 800
      do_refinement: True
      w_data: 0.2
      w_smooth: 0.3

# 控制器服务器 - MPPI（三舵轮 = OmniDrive）
controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001      # 三舵轮支持侧向，阈值调小
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    speed_limit_topic: "speed_limit"

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 36
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.3
      vy_std: 0.3                    # 三舵轮：支持侧向
      wz_std: 0.4
      
      # ✅ 三舵轮速度限制
      vx_max: 1.2                    # 最大前进速度
      vx_min: -0.35                  # 最大后退速度
      vy_max: 0.8                    # ✅ 侧向速度（三舵轮支持）
      wz_max: 1.0                    # 最大角速度
      
      ax_max: 2.0                    # 最大加速度
      ax_min: -2.0                   # 最大减速度
      
      iteration_count: 1
      prune_distance: 3.0
      transform_tolerance: 0.3
      temperature: 0.5
      gamma: 0.02
      
      # ✅ 三舵轮：使用 OmniDrive
      motion_model: "Omni"      # 从 DiffDrive 改为 OmniDrive
      
      visualize: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      
      critics:
        [
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "PathAlignCritic",
          "PathFollowCritic",
          "PathAngleCritic",
          "PreferForwardCritic",
          "ObstaclesCritic",
        ]
      
      ConstraintCritic:
        enabled: True
        cost_power: 1
        cost_weight: 4.0
      
      GoalCritic:
        enabled: True
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      
      GoalAngleCritic:
        enabled: True
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      
      PreferForwardCritic:
        enabled: True
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      
      ObstaclesCritic:
        enabled: True
        cost_power: 1
        repulsion_weight: 7.5
        critical_weight: 15.0
        consider_footprint: false
        collision_cost: 10000.0
        collision_margin_distance: 0.1
        near_goal_distance: 0.5
      
      CostCritic:
        enabled: True
        cost_power: 1
        cost_weight: 14.5
        critical_cost: 400.0
        consider_footprint: True
        collision_cost: 1000000.0
        near_goal_distance: 1.0
      
      PathAlignCritic:
        enabled: True
        cost_power: 1
        cost_weight: 10.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      
      PathFollowCritic:
        enabled: True
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      
      PathAngleCritic:
        enabled: True
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        forward_preference: true

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: True

## 本地代价地图
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 15.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: True
      width: 8
      height: 8
      resolution: 0.05
      footprint: "[[-0.3, -0.2], [-0.3, 0.2], [0.3, 0.2], [0.3, -0.2]]"
      inflation_radius: 0.6
      
      # ✅ 三舵轮：只用3D雷达点云
      plugins: ["obstacle_layer", "inflation_layer"]
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.6
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        # ✅ 单雷达点云
        observation_sources: lidar
        lidar:
          topic: /lidar/point_cloud/points
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "PointCloud2"           # ✅ 3D点云类型
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 7.5
          obstacle_min_range: 0.0
          min_obstacle_height: -0.5          # ✅ 地面以下忽略
          max_obstacle_height: 0.5           # ✅ 只检测地面附近
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      
      always_send_full_costmap: True
  
  local_costmap_client:
    ros__parameters:
      use_sim_time: True
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

## 全局代价地图
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      footprint: "[[-0.3, -0.2], [-0.3, 0.2], [0.3, 0.2], [0.3, -0.2]]"
      resolution: 0.05
      track_unknown_space: True
      
      # ✅ 三舵轮：只用3D雷达点云
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: lidar
        lidar:
          topic: /lidar/point_cloud/points
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "PointCloud2"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 7.5
          obstacle_min_range: 0.0
          min_obstacle_height: -0.5
          max_obstacle_height: 0.5
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.6
      
      always_send_full_costmap: True

  global_costmap_client:
    ros__parameters:
      use_sim_time: True
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: True

## 路点跟踪器
waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

